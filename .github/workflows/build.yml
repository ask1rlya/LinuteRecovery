name: Linute Recovery Build
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Build Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y bc build-essential zip curl libc6-dev libncurses5-dev libssl-dev python3 repo

      - name: Setup Linute (OrangeFox) Sync
        run: |
          mkdir -p ~/orangefox
          cd ~/orangefox
          git clone https://gitlab.com/OrangeFox/sync.git
          cd sync
          bash orangefox_sync.sh --branch 12.1 --path /home/runner/orangefox

      - name: Clone Device Tree
        run: |
          git clone https://github.com/ask1rlya/device_xiaomi_fog /home/runner/orangefox/device/xiaomi/fog

      - name: Start Compilation
        run: |
          set -x
          cd /home/runner/orangefox
          export ALLOW_MISSING_DEPENDENCIES=true
          source build/envsetup.sh 2>&1
          lunch twrp_fog-eng 2>&1
          mka recoveryimage 2>&1
