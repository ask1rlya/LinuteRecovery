name: Linute Recovery Build
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Build Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y bc build-essential zip curl libc6-dev libncurses5-dev libssl-dev python3 repo

      - name: Setup Linute (OrangeFox) Sync
        run: |
          mkdir -p ~/orangefox
          cd ~/orangefox
          git clone https://gitlab.com/OrangeFox/sync.git
          cd sync
          bash orangefox_sync.sh --branch 12.1 --path /home/runner/orangefox

      - name: Clone Device Tree
        run: |
          git clone https://github.com/cd-Crypton/android_device_xiaomi_fog-TWRP \
            -b android-12.1 \
            /home/runner/orangefox/device/xiaomi/fog
            
      - name: Start Compilation
        run: |
          cd /home/runner/orangefox
          export ALLOW_MISSING_DEPENDENCIES=true
          export FOX_BUILD_TYPE=Unofficial
          source build/envsetup.sh
          lunch twrp_fog-eng
          mka recoveryimage 2>&1 | tee build.log
