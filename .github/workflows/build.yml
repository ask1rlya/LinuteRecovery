name: Linute Recovery Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Recovery Build Action
        uses: GearS3/Recovery-Builder-Action@main
        with:
          # Ссылка на твое дерево (проверь, чтобы была без двойных https)
          DEVICE_TREE: https://github.com
          DEVICE_TREE_BRANCH: lineage-23.0
          DEVICE_NAME: fog
          # Тип рекавери (fox - для OrangeFox)
          RECOVERY_TYPE: fox
          BUILD_TARGET: recovery
