name: Linute Recovery Build
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Build Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y bc build-essential zip curl libc6-dev libncurses5-dev libssl-dev python3 repo git

      - name: Setup OrangeFox Sync
        run: |
          mkdir -p ~/OrangeFox_sync
          cd ~/OrangeFox_sync
          git clone https://gitlab.com/OrangeFox/sync.git
          cd sync
          ./orangefox_sync.sh --branch 11.0 --path ~/fox_11.0

      - name: Clone Device Tree
        run: |
          mkdir -p ~/fox_11.0/device/xiaomi/fog
          curl -L "https://github.com/Madness-Dreamone/twrp_xiaomi_fog/archive/refs/heads/twrp-11.zip" -o /tmp/tree.zip
          unzip -q /tmp/tree.zip -d /tmp/tree
          cp -r /tmp/tree/twrp_xiaomi_fog-twrp-11/. ~/fox_11.0/device/xiaomi/fog/
          rm -rf /tmp/tree /tmp/tree.zip
          ls ~/fox_11.0/device/xiaomi/fog/
          
      - name: Check Structure
        run: |
          echo "=== Home ==="
          ls ~/
          echo "=== fox_11.0 ==="
          ls ~/fox_11.0/ || echo "папки нет"
          echo "=== envsetup.sh search ==="
          find ~/ -name "envsetup.sh" 2>/dev/null | head -10

      - name: Start Compilation
        run: |
          cd ~/fox_11.0
          export ALLOW_MISSING_DEPENDENCIES=true
          export FOX_BUILD_TYPE=Unofficial
          source build/envsetup.sh
          lunch twrp_fog-eng
          mka recoveryimage 2>&1 | tee build.log

      - name: Upload Recovery
        uses: actions/upload-artifact@v4
        with:
          name: Linute-Recovery-fog
          path: ~/fox_11.0/out/target/product/fog/recovery.img
