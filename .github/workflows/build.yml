name: Linute Recovery Build
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Build Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y bc build-essential zip curl libc6-dev libncurses5-dev libssl-dev python3 repo git

      - name: Setup OrangeFox Sync
        run: |
          mkdir -p ~/OrangeFox_sync
          cd ~/OrangeFox_sync
          git clone https://gitlab.com/OrangeFox/sync.git
          cd sync
          ./orangefox_sync.sh --branch 12.1 --path ~/fox_12.1

      - name: Clone Device Tree
        run: |
          mkdir -p ~/fox_12.1/device/xiaomi/fog
          curl -L "https://github.com/cd-Crypton/android_device_xiaomi_fog-TWRP/archive/refs/heads/android-12.1.zip" -o /tmp/tree.zip
          unzip -q /tmp/tree.zip -d /tmp/tree
          cp -r /tmp/tree/android_device_xiaomi_fog-TWRP-android-12.1/. ~/fox_12.1/device/xiaomi/fog/
          rm -rf /tmp/tree /tmp/tree.zip

      - name: Start Compilation
        run: |
          cd ~/fox_12.1
          export ALLOW_MISSING_DEPENDENCIES=true
          export FOX_BUILD_TYPE=Unofficial
