name: Linute Recovery Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Build Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y bc build-essential zip curl libc6-dev libncurses5-dev libssl-dev python3 repo

      - name: Setup Linute (OrangeFox) Sync
        run: |
          mkdir -p ~/orangefox
          cd ~/orangefox
          git config --global user.email "you@example.com"
          git config --global user.name "Your Name"
          
          # Используем только чистую ссылку на репозиторий
          git clone https://gitlab.com/OrangeFox/sync/-/tree/master/info/refs?service=git-upload-pack sync_folder
          
          # Переходим именно в ту папку, которую создали выше
          cd sync_folder
          
          # Запускаем скрипт
          bash orangefox_sync.sh --branch 12.1 --path ~/orangefox







          
      - name: Clone Device Tree
        run: |
          cd ~/orangefox
          git clone https://github.com -b lineage-23.0 device/xiaomi/fog

      - name: Start Compilation
        run: |
          echo "Здесь начнется магия сборки Linute..."
