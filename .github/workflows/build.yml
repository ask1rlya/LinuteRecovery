name: Linute Recovery Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Build Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y bc build-essential zip curl libc6-dev libncurses5-dev libssl-dev python3 repo

      - name: Setup Linute (OrangeFox) Sync
        run: |
          mkdir -p ~/orangefox
          cd ~/orangefox
          
          # Скачиваем скрипты по ПРЯМОЙ ссылке из репозитория
          git clone https://gitlab.com/OrangeFox/sync.git
          
          # Заходим в папку
          cd sync
          
          # Запускаем сам скрипт (используем ПОЛНЫЙ путь)
          bash orangefox_sync.sh --branch 12.1 --path /home/runner/orangefox








          
           - name: Clone Device Tree
          run: |
          cd ~/orangefox
          git clone https://github.com/ask1rlya/device_xiaomi_fog -b lineage-23.0 device/xiaomi/fog

      - name: Start Compilation
        run: |
          echo "Здесь начнется магия сборки Linute..."
